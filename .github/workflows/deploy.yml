name: CI / Deploy — VenusGlobal Landing

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Lint & Type Check
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Build → static export into out/
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      # ── Critical: without .nojekyll, GitHub Pages strips any folder that
      # starts with "_", which includes _next/static/ (your CSS and JS).
      - name: Add .nojekyll to disable Jekyll processing
        run: touch ./out/.nojekyll

      # ── Custom domain: tells GitHub Pages which domain to serve this site on.
      # Without this file, GitHub resets the custom domain on every deploy.
      - name: Write CNAME for custom domain
        run: echo "venusglobal.com.hk" > ./out/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Deploy to GitHub Pages (main branch only)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy → GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
